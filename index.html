<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="https://courses.joshwcomeau.com/favicon.rainbow.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Code Playground</title>
  </head>
  <body>
    <style>

  @keyframes fromShruken{
    from {
      transform: scale(0);
    }
  }

  @keyframes circleColorShift{
    from {
      background: hsl(350deg 100% 60%);
    }
  }

  @keyframes fadeFromOpaque {
    from {
      opacity: 1;
    }
  }

  @keyframes popcircle{
    from {
      background: hsl(340deg 100% 60%);
      opacity: 1;
      transform: scale(0);
    }
  }


  .popCircle{
    position: absolute;
    inset: 0;
    background: hsl(270deg 100% 80%);
    border-radius: 50%;
    opacity: 0;
  }

  .particleButton.liked .popCircle {
    animation:
    fromShrunken var(--pop-circle-duration),
    circleColorShift 150ms,
    fadeFromOpaque 300ms 150ms backwards;
  }


  @keyframes twinkle {
    from {
      opacity: 0.5;
    }
    to{
      opacity: 1;
    }
  }
    @keyframes fadeToTransparent {
      to {
        opacity: 0;
      }
    }
    
    @keyframes disperse {
      to {
        transform: rotate(90deg)
        translate(
          calc(cos(var(--angle)) * var(--distance)),
          calc(sin(var(--angle)) * var(--distance))
        );
      }
    }
    
    .particle {
      width: var(--size);
      height: var(--size);
      animation:
        twinkle var(--twinkle-duration) infinite alternate ease-in-out,
        fadeToTransparent var(--fade-duration) var(--fade-delay) forwards,
        disperse var(--pop-duration) forwards var(--particle-curve);
    }
    
      
    </style>
    
    <button class="particleButton">
      <span class="popCircle"></span>
      <svg
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M3.68546 5.43796C8.61936 1.29159 11.8685 7.4309 12.0406 7.4309C12.2126 7.43091 15.4617 1.29159 20.3956 5.43796C26.8941 10.8991 13.5 21.8215 12.0406 21.8215C10.5811 21.8215 -2.81297 10.8991 3.68546 5.43796Z"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <span class="visually-hidden">Like this post</span>
    </button>

    <script type="module" src="/src/index.js"></script>
  </body>
</html>
